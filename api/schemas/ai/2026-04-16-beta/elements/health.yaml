description:
  - locale: en
    value: >-
      Supports the measurement or monitoring of the aspects of the physical environment that impacts human health, such
      as radiation or air quality, or in specific contexts such as the workplace.
  - locale: es
    value: >-
      Apoya la mediciГіn o el monitoreo de los aspectos del entorno fГӯsico que afecta la salud humana, como radiaciГіn o
      calidad del aire, o en contextos especГӯficos como el lugar de trabajo.
  - locale: fr
    value: >-
      Permet la mesure ou la surveillance des aspects de l'environnement physique qui ont un impact sur la santГ©
      humaine, comme les [rayonnements](https://fr.wikipedia.org/wiki/Radioprotection) ou la [qualitГ© de
      l'air](https://fr.wikipedia.org/wiki/Pollution_de_l%27air), ou dans des contextes spГ©cifiques comme le lieu de
      travail. Pour en savoir plus sur [la surveillance de
      l'environnement](https://fr.wikipedia.org/wiki/Observatoire_de_l%27environnement) et [la santГ© et la sГ©curitГ© au
      travail](https://fr.wikipedia.org/wiki/SantГ©_et_sГ©curitГ©_au_travail)
  - locale: km
    value: >-
      бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҖбһ¶бһҡбһңбһ¶бһҹбҹӢбһңбҹӮбһ„ бһ¬бһҖбһ¶бһҡбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһ·бһҠбҹ’бһӢбһ—бһ¶бһ–бһ“бҹғбһ”бһҡбһ·бһҷбһ¶бһҖбһ¶бһҹбһҡбһ¶бһ„бһҖбһ¶бһҷбһҠбҹӮбһӣбһ”бҹүбҹҮбһ–бһ¶бһӣбҹӢбһҠбһӣбҹӢбһҹбһ»бһҒбһ—бһ¶бһ–бһҳбһ“бһ»бһҹбҹ’бһҹ бһҠбһјбһ…бһҮбһ¶
      [бһңбһ·бһ‘бҹ’бһҷбһ»бһҹбһҖбһҳбҹ’бһҳ](https://en.wikipedia.org/wiki/Radiation_protection) бһ¬
      [бһӮбһ»бһҺбһ—бһ¶бһ–бһҒбҹ’бһҷбһӣбҹӢ](https:/en.wikipedia.org/wiki/Air_pollution) бһ¬бһҖбҹ’бһ“бһ»бһ„бһ”бһҡбһ·бһ”бһ‘бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҠбһјбһ…бһҮбһ¶бһҖбһ“бҹ’бһӣбҹӮбһ„бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбҹ”
      бһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһ”бһ“бҹ’бһҗбҹӮбһҳбһўбҹҶбһ–бһё [бһҖбһ¶бһҡбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ”бһҡбһ·бһҹбҹ’бһҗбһ¶бһ“](https://en.wikipedia.org/wiki/Environmental_monitoring) бһ“бһ·бһ„ [бһҹбһ»бһҒбһ—бһ¶бһ–
      бһ“бһ·бһ„бһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ–бһҖбһ¶бһҡбһ„бһ¶бһҡ](https://en.wikipedia.org/wiki/Occupational_safety_and_health)
