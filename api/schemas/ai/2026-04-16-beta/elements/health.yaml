description:
  - locale: en
    value: >-
      Supports the measurement or monitoring of the aspects of the physical environment that impacts human health, such
      as radiation or air quality, or in specific contexts such as the workplace.
  - locale: es
    value: >-
      Apoya la medición o el monitoreo de los aspectos del entorno físico que afecta la salud humana, como radiación o
      calidad del aire, o en contextos específicos como el lugar de trabajo.
  - locale: fr
    value: >-
      Permet la mesure ou la surveillance des aspects de l'environnement physique qui ont un impact sur la santé
      humaine, comme les [rayonnements](https://fr.wikipedia.org/wiki/Radioprotection) ou la [qualité de
      l'air](https://fr.wikipedia.org/wiki/Pollution_de_l%27air), ou dans des contextes spécifiques comme le lieu de
      travail. Pour en savoir plus sur [la surveillance de
      l'environnement](https://fr.wikipedia.org/wiki/Observatoire_de_l%27environnement) et [la santé et la sécurité au
      travail](https://fr.wikipedia.org/wiki/Santé_et_sécurité_au_travail)
  - locale: km
    value: >-
      គាំទ្រការវាស់វែង ឬការត្រួតពិនិត្យទិដ្ឋភាពនៃបរិយាកាសរាងកាយដែលប៉ះពាល់ដល់សុខភាពមនុស្ស ដូចជា
      [វិទ្យុសកម្ម](https://en.wikipedia.org/wiki/Radiation_protection) ឬ
      [គុណភាពខ្យល់](https:/en.wikipedia.org/wiki/Air_pollution) ឬក្នុងបរិបទជាក់លាក់ដូចជាកន្លែងធ្វើការ។
      ស្វែងយល់បន្ថែមអំពី [ការត្រួតពិនិត្យបរិស្ថាន](https://en.wikipedia.org/wiki/Environmental_monitoring) និង [សុខភាព
      និងសុវត្ថិភាពការងារ](https://en.wikipedia.org/wiki/Occupational_safety_and_health)
  - locale: pt
    value: >-
      Apoia a medição ou monitorização dos aspectos do ambiente físico que têm impacto na saúde humana, como a radiação
      ou a qualidade do ar, ou em contextos específicos como o local de trabalho.
  - locale: tl
    value: >-
      Sinusuportahan ang pagsukat o pagsubaybay sa mga aspeto ng pisikal na kapaligiran na nakakaapekto sa kalusugan ng
      tao, tulad ng radiation o kalidad ng hangin, o sa mga tiyak na konteksto tulad ng lugar ng trabaho. Alamin ang
      higit pa tungkol sa [pagsubaybay sa kapaligiran](https://en.wikipedia.org/wiki/environmental_monitoring) at
      [Occupational Health and Safety](https://en.wikipedia.org/wiki/occupat"&"ional_safety_and_health)")
