description:
  - locale: en
    value: >-
      The risk that people place excessive trust in AI systems, leading to insufficient human oversight or inability to
      question algorithmic decisions. This can result in uncritical acceptance of AI outputs even when they are
      incorrect or harmful. Mitigations may include clear communication about system limitations, training for users on
      appropriate reliance, and maintaining meaningful human involvement in critical decisions.
  - locale: es
    value: >-
      El riesgo de que la gente deposite una confianza excesiva en los sistemas de IA, lo que lleva a una supervisiГіn
      humana insuficiente o a la incapacidad de cuestionar las decisiones algorГӯtmicas. Esto puede dar lugar a una
      aceptaciГіn acrГӯtica de los resultados de la IA, incluso cuando son incorrectos o perjudiciales. Las medidas de
      mitigaciГіn pueden incluir una comunicaciГіn clara sobre las limitaciones del sistema, la formaciГіn de los usuarios
      sobre la confianza adecuada y el mantenimiento de una participaciГіn humana significativa en las decisiones
      crГӯticas.
  - locale: fr
    value: >-
      Le risque que les gens accordent une confiance excessive aux systГЁmes d'IA, conduisant Г  une surveillance humaine
      insuffisante ou Г  l'incapacitГ© de remettre en question les dГ©cisions algorithmiques. Il peut en rГ©sulter une
      acceptation non critique des rГ©sultats de l'IA, mГӘme lorsqu'ils sont incorrects ou nuisibles. Les mesures
      d'attГ©nuation peuvent inclure une communication claire sur les limites du systГЁme, la formation des utilisateurs Г 
      une confiance appropriГ©e et le maintien d'une participation humaine significative dans les dГ©cisions critiques.
  - locale: km
    value: >-
      бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹӮбһӣбһҳбһ“бһ»бһҹбҹ’бһҹбһҠбһ¶бһҖбҹӢбһҖбһ¶бһҡбһҮбһҝбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһӣбһҫбһҹбһӣбһ”бҹӢбһӣбһҫбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ AI бһҠбҹӮбһӣбһ“бһ¶бҹҶбһұбҹ’бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҡбһ”бһҹбҹӢбһҳбһ“бһ»бһҹбҹ’бһҹбһҳбһ·бһ“бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢ
      бһ¬бһўбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ…бҹ„бһ‘бһҹбһҪбһҡбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҸбһ¶бһҳбһҖбҹ’бһ”бһҪбһ“бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбҹ” бһ“бҹҒбҹҮбһўбһ¶бһ…бһ”бһҺбҹ’бһҸбһ¶бһӣбһұбҹ’бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһ‘бһ‘бһҪбһӣбһҷбһҖбһӣбһ‘бҹ’бһ’бһ•бһӣ AI бһҠбҹ„бһҷбһҳбһ·бһ“бһҷбһҖбһ…бһ·бһҸбҹ’бһҸбһ‘бһ»бһҖбһҠбһ¶бһҖбҹӢ
      бһ‘бҹ„бҹҮбһ”бһёбһҮбһ¶бһңбһ¶бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһ¬бһҳбһ¶бһ“бһӮбҹ’бһҡбҹ„бҹҮбһҗбҹ’бһ“бһ¶бһҖбҹӢбһҖбҹҸбһҠбҹ„бһҷбҹ”
      бһҖбһ¶бһҡбһ”бһ“бҹ’бһ’бһјбһҡбһ”бһ“бҹ’бһҗбһҷбһўбһ¶бһ…бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣбһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһҹбҹ’бһҡбҹҗбһҷбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбһўбҹҶбһ–бһёбһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’
      бһҖбһ¶бһҡбһ”бһҺбҹ’бһҸбһ»бҹҮбһ”бһҺбҹ’бһҸбһ¶бһӣбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһӣбһҫбһҖбһ¶бһҡбһ–бһ№бһ„бһ•бҹ’бһўбҹӮбһҖбһҹбһҳбһҹбҹ’бһҡбһ”
      бһ“бһ·бһ„бһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһҖбһ¶бһҡбһ…бһјбһӣбһҡбһҪбһҳбһҡбһ”бһҹбҹӢбһҳбһ“бһ»бһҹбҹ’бһҹбһ”бҹ’бһҡбһҖбһ”бһҠбҹ„бһҷбһўбһҸбҹ’бһҗбһ“бҹҗбһҷбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҹбҹҶбһҒбһ¶бһ“бҹӢбҹ—бҹ”
  - locale: pt
    value: >-
      O risco de as pessoas confiarem excessivamente nos sistemas de IA, levando a uma supervisГЈo humana insuficiente ou
      Г  incapacidade de questionar as decisГөes algorГӯtmicas. Isso pode resultar na aceitaГ§ГЈo acrГӯtica dos resultados da
      IA, mesmo quando estiverem incorretos ou forem prejudiciais. As mitigaГ§Гөes podem incluir uma comunicaГ§ГЈo clara
      sobre as limitaГ§Гөes do sistema, treinamento para os usuГЎrios sobre a confianГ§a adequada e manutenГ§ГЈo de um
      envolvimento humano significativo em decisГөes crГӯticas.
  - locale: tl
    value: >-
      Ang panganib na ang mga tao ay naglalagay ng labis na pagtitiwala sa mga sistema ng AI, na humahantong sa hindi
      sapat na pangangasiwa ng tao o kawalan ng kakayahang magtanong ng mga algorithmic na desisyon. Maaari itong
      magresulta sa hindi kritikal na pagtanggap sa mga output ng AI kahit na mali o nakakapinsala ang mga ito. Maaaring
      kabilang sa mga pagpapagaan ang malinaw na komunikasyon tungkol sa mga limitasyon ng system, pagsasanay para sa
      mga user sa naaangkop na pagtitiwala, at pagpapanatili ng makabuluhang pakikilahok ng tao sa mga kritikal na
      desisyon.
