      ទិន្នន័យត្រូវបានគាំទ្រដោយយុត្តាធិការដែលវាត្រូវបានប្រមូល។ ស្វែងយល់បន្ថែម
      [នៅទីនេះ](https://en.wikipedia.org/wiki/data_sovereignty)
  - locale: pt
    value: Os dados são salvaguardados com a jurisdição onde foram recolhidos.
  - locale: tl
    value: Ang datos ay nai-back up sa hurisdiksyon kung saan nakolekta ito.
