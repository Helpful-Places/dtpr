description:
  - locale: en
    value: >-
      Available to me but not to other individuals. For example, as an individual you have access to all your electronic
      toll records for your car, but other individuals do not have access to that.
  - locale: es
    value: >-
      Disponible para mГӯ pero no para otras personas. Por ejemplo, como individuo, tiene acceso a todos sus registros de
      peaje electrГіnicos para su automГіvil, pero otras personas no tienen acceso a eso.
  - locale: fr
    value: >-
      Disponible pour moi mais pas pour d'autres individus. Par exemple, en tant qu'individu, vous avez accГ©s Г  tous vos
      enregistrements de pГ©age Г©lectronique pour votre voiture, mais les autres individus n'y ont pas accГ©s.
  - locale: km
    value: >-
      бһҳбһ¶бһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҒбҹ’бһүбһ»бҹҶбһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҳбһ·бһ“бһұбҹ’бһҷбһ”бһ»бһӮбҹ’бһӮбһӣбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбһ‘бҹҒбҹ”
      бһ§бһ‘бһ¶бһ бһҡбһҺбҹҚбһҖбҹ’бһ“бһ»бһ„бһ“бһ¶бһҳбһҮбһ¶бһ”бһ»бһӮбҹ’бһӮбһӣбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһҹбһ·бһ‘бҹ’бһ’бһ·бһ…бһјбһӣбһ”бҹ’бһҡбһҫбһҖбҹҶбһҺбһҸбҹӢбһҸбҹ’бһҡбһ¶бһўбҹҒбһЎбһ·бһ…бһҸбҹ’бһҡбһјбһ“бһ·бһ…бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҡбһҗбһҷбһ“бҹ’бһҸбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ”бһ»бһӮбҹ’бһӮбһӣбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбһҳбһ·бһ“бһҳбһ¶бһ“бһӣбһ‘бҹ’бһ’бһ—бһ¶бһ–бһ…бһјбһӣбһ”бҹ’бһҡбһҫбһңбһ¶бһ‘бҹҒбҹ”
  - locale: pt
    value: >-
      DisponГӯvel para mim, mas nГЈo para outros indivГӯduos. Por exemplo, enquanto indivГӯduo, tem acesso a todos os
      registos electrГіnicos de portagens do seu automГіvel, mas outros indivГӯduos nГЈo tГӘm acesso a esses registos.
  - locale: tl
    value: >-
      Magagamit sa akin ngunit hindi sa ibang mga indibidwal. Halimbawa, bilang isang indibidwal mayroon kang access sa
      lahat ng iyong mga talaan ng electronic toll para sa iyong kotse, ngunit ang ibang mga indibidwal ay walang access
      sa mga ito
