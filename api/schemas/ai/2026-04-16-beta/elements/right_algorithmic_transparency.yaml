description:
  - locale: en
    value: >-
      The right to understand how an AI system makes decisions that affect you, including meaningful information about
      the logic involved, the significance of the processing, and the likely consequences. This information should be
      provided in clear, plain language that allows you to understand how the system works and how it arrived at a
      particular decision.
  - locale: es
    value: >-
      El derecho a entender cГіmo un sistema de IA toma decisiones que le afectan, incluyendo informaciГіn significativa
      sobre la lГіgica implicada, la importancia del procesamiento y las consecuencias probables. Esta informaciГіn debe
      proporcionarse en un lenguaje claro y sencillo que le permita comprender cГіmo funciona el sistema y cГіmo ha
      llegado a una decisiГіn concreta.
  - locale: fr
    value: >-
      Le droit de comprendre comment un systГЁme d'IA prend des dГ©cisions qui vous affectent, y compris des informations
      significatives sur la logique impliquГ©e, la signification du traitement et les consГ©quences probables. Ces
      informations doivent ГӘtre fournies dans un langage clair et simple qui vous permette de comprendre comment le
      systГЁme fonctionne et comment il est parvenu Г  une dГ©cision particuliГЁre.
  - locale: km
    value: >-
      бһҹбһ·бһ‘бҹ’бһ’бһ·бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҷбһӣбҹӢбһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ AI бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһ”бҹүбҹҮбһ–бһ¶бһӣбҹӢбһҠбһӣбҹӢбһўбҹ’бһ“бһҖ
      бһҡбһҪбһҳбһ‘бһ¶бҹҶбһ„бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҠбҹҸбһҳбһ¶бһ“бһўбһҸбҹ’бһҗбһ“бҹҗбһҷбһўбҹҶбһ–бһёбһҸбһҖбҹ’бһҖбһңбһ·бһҮбҹ’бһҮбһ¶бһҠбҹӮбһӣбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’ бһҹбһ¶бһҡбҹҲбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ“бҹғбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ бһ“бһ·бһ„бһ•бһӣбһңбһ·бһ”бһ¶бһҖбһҠбҹӮбһӣбһўбһ¶бһ…бһҖбһҫбһҸбһҳбһ¶бһ“бҹ”
      бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ“бҹҒбҹҮбһӮбһҪбһҡбһҸбҹӮбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“бһҮбһ¶бһ—бһ¶бһҹбһ¶бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһҠбҹӮбһӣбһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһҷбһӣбҹӢбһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ
      бһ“бһ·бһ„бһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһңбһ¶бһ”бһ¶бһ“бһҳбһҖбһҠбһӣбҹӢбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҳбһҪбһҷбҹ”
  - locale: pt
    value: >-
      O direito de entender como um sistema de IA toma decisГөes que o afetam, incluindo informaГ§Гөes significativas sobre
      a lГіgica envolvida, a importГўncia do processamento e as provГЎveis consequГӘncias. Essas informaГ§Гөes devem ser
      fornecidas em linguagem clara e simples que permita que vocГӘ entenda como o sistema funciona e como ele chegou a
      uma determinada decisГЈo.
  - locale: tl
    value: >-
      Ang karapatang maunawaan kung paano gumagawa ng mga desisyon ang AI system na makakaapekto sa iyo, kabilang ang
      makabuluhang impormasyon tungkol sa lohika na kasangkot, ang kahalagahan ng pagproseso, at ang mga posibleng
      kahihinatnan. Ang impormasyong ito ay dapat ibigay sa malinaw at simpleng wika na nagbibigay-daan sa iyong
      maunawaan kung paano gumagana ang system at kung paano ito nakarating sa isang partikular na desisyon.
