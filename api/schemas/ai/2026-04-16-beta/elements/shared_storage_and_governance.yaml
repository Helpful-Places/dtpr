description:
  - locale: en
    value: >-
      In a shared data store model the data store is shared across multiple parties and because the infrastructure is
      shared it becomes possible to enforce governance around the retention, access and destruction of the data by
      policies built into the structure of the data itself.
  - locale: es
    value: >-
      En un modelo de almacГ©n de datos compartido, el almacГ©n de datos se comparte en mГәltiples partes y, debido a que
      la infraestructura se comparte, es posible hacer cumplir la gobernanza en torno a la retenciГіn, acceso y
      destrucciГіn de los datos por las polГӯticas integradas en la estructura de los datos en sГӯ.
  - locale: fr
