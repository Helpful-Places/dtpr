description:
  - locale: en
    value: >-
      The risk that the AI system performs differently (typically worse) for certain demographic groups based on
      characteristics such as race, gender, age, disability status, or socioeconomic background. This can lead to biased
      or unfair outcomes that disproportionately impact vulnerable communities. Mitigations may include diverse training
      data, routine fairness audits, and regular performance monitoring across different demographic groups.
  - locale: es
    value: >-
      El riesgo de que el sistema de IA funcione de forma diferente (normalmente peor) para determinados grupos
      demogrГЎficos en funciГіn de caracterГӯsticas como la raza, el sexo, la edad, la discapacidad o el nivel
      socioeconГіmico. Esto puede dar lugar a resultados sesgados o injustos que afecten de forma desproporcionada a las
      comunidades vulnerables. Las medidas de mitigaciГіn pueden incluir datos de formaciГіn diversos, auditorГӯas
      rutinarias de imparcialidad y un control regular del rendimiento de los distintos grupos demogrГЎficos.
  - locale: fr
    value: >-
      Le risque que le systГЁme d'IA fonctionne diffГ©remment (gГ©nГ©ralement moins bien) pour certains groupes
      dГ©mographiques sur la base de caractГ©ristiques telles que la race, le sexe, l'Гўge, le statut de handicapГ© ou le
      contexte socio-Г©conomique. Cela peut conduire Г  des rГ©sultats biaisГ©s ou injustes qui ont un impact
      disproportionnГ© sur les communautГ©s vulnГ©rables. Les mesures d'attГ©nuation peuvent inclure des donnГ©es de
      formation diversifiГ©es, des audits d'Г©quitГ© de routine et un contrГҙle rГ©gulier des performances au sein de
      diffГ©rents groupes dГ©mographiques.
  - locale: km
    value: >-
      бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹӮбһӣбһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ AI бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҒбһ»бһҹбһӮбҹ’бһ“бһ¶ (бһҮбһ¶бһ’бһҳбҹ’бһҳбһҸбһ¶бһҖбһ¶бһ“бҹӢбһҸбҹӮбһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ)
      бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбҹ’бһҡбһ»бһҳбһ”бҹ’бһҡбһҮбһ¶бһҹбһ¶бһҹбҹ’бһҡбҹ’бһҸбһҳбһҪбһҷбһ…бҹҶбһ“бһҪбһ“бһҠбҹ„бһҷбһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһӣбһҖбҹ’бһҒбһҺбҹҲбһҠбһјбһ…бһҮбһ¶ бһ–бһјбһҮбһҹбһ¶бһҹбһ“бҹҚ бһ—бҹҒбһ‘ бһўбһ¶бһҷбһ» бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһ–бһ·бһҖбһ¶бһҡбһ—бһ¶бһ– бһ¬бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбҹҒбһҠбҹ’бһӢбһҖбһ·бһ…бҹ’бһ…бһҹбһ„бҹ’бһӮбһҳбҹ”
      бһ“бҹҒбҹҮбһўбһ¶бһ…бһ“бһ¶бҹҶбһұбҹ’бһҷбһҳбһ¶бһ“бһӣбһ‘бҹ’бһ’бһ•бһӣбһӣбҹҶбһўбҹҖбһ„ бһ¬бһўбһҷбһ»бһҸбҹ’бһҸбһ·бһ’бһҳбҹҢ бһҠбҹӮбһӣбһ”бҹүбҹҮбһ–бһ¶бһӣбҹӢбһҠбһӣбҹӢбһҹбһ бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһ„бһ¶бһҷбһҡбһ„бһӮбҹ’бһҡбҹ„бҹҮбһҳбһ·бһ“бһҹбһҳбһ¶бһҳбһ¶бһҸбҹ’бһҡбҹ”
      бһҖбһ¶бһҡбһ”бһ“бҹ’бһ’бһјбһҡбһ”бһ“бҹ’бһҗбһҷбһўбһ¶бһ…бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ”бһҺбҹ’бһҠбһ»бҹҮбһ”бһҺбҹ’бһҠбһ¶бһӣбһ…бһҳбҹ’бһҡбһ»бҹҮ бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһҹбһңбһ“бһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһҷбһ»бһҸбҹ’бһҸбһ·бһ’бһҳбҹҢбһҸбһ¶бһҳбһ‘бһҳбҹ’бһӣбһ¶бһ”бҹӢ
      бһ“бһ·бһ„бһҖбһ¶бһҡбһҸбҹ’бһҡбһҪбһҸбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҖбһ¶бһҡбһўбһ“бһ»бһңбһҸбҹ’бһҸбһҮбһ¶бһ”бҹ’бһҡбһ…бһ¶бҹҶбһ“бҹ…бһ‘бһјбһ‘бһ¶бҹҶбһ„бһҖбҹ’бһҡбһ»бһҳбһ”бҹ’бһҡбһҮбһ¶бһҹбһ¶бһҹбҹ’бһҡбҹ’бһҸбһ•бҹ’бһҹбҹҒбһ„бҹ—бһӮбҹ’бһ“бһ¶бҹ”
  - locale: pt
    value: >-
      O risco de o sistema de IA ter um desempenho diferente (normalmente pior) para determinados grupos demogrГЎficos
      com base em caracterГӯsticas como raГ§a, sexo, idade, status de deficiГӘncia ou histГіrico socioeconГҙmico. Isso pode
      levar a resultados tendenciosos ou injustos que afetam desproporcionalmente as comunidades vulnerГЎveis. As
      mitigaГ§Гөes podem incluir dados de treinamento diversificados, auditorias rotineiras de justiГ§a e monitoramento
      regular do desempenho em diferentes grupos demogrГЎficos.
  - locale: tl
    value: >-
      Ang panganib na iba ang pagganap ng AI system (karaniwang mas malala) para sa ilang partikular na demograpikong
      grupo batay sa mga katangian gaya ng lahi, kasarian, edad, kapansanan, o socioeconomic na background. Ito ay
      maaaring humantong sa may kinikilingan o hindi patas na mga resulta na hindi katumbas ng epekto sa mga mahihinang
      komunidad. Maaaring kabilang sa mga mitigations ang magkakaibang data ng pagsasanay, regular na pag-audit sa
      pagiging patas, at regular na pagsubaybay sa pagganap sa iba't ibang demograpikong grupo.
