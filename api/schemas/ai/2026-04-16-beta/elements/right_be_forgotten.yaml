  - locale: pt
    value: >-
      O direito de solicitar a exclusГЈo de seus dados pessoais de um sistema de IA sob determinadas condiГ§Гөes, como
      quando os dados nГЈo forem mais necessГЎrios para sua finalidade original, quando vocГӘ retirar seu consentimento ou
      quando nГЈo houver interesse legГӯtimo em continuar a processГЎ-los. Isso inclui o direito de fazer com que o sistema
      "desaprenda" as informaГ§Гөes derivadas de seus dados quando for tecnicamente viГЎvel.
  - locale: tl
    value: >-
      Ang karapatang humiling ng pagtanggal ng iyong personal na data mula sa isang AI system sa ilalim ng ilang
      partikular na kundisyon, tulad ng kapag ang data ay hindi na kailangan para sa orihinal nitong layunin, kapag
      nag-withdraw ka ng pahintulot, o kapag walang lehitimong interes sa patuloy na pagproseso nito. Kabilang dito ang
      karapatang magkaroon ng impormasyon na "hindi matutunan" ng system na hango sa iyong data kung saan posible sa
      teknikal.
