description:
  - locale: en
    value: >-
      The right to request the deletion of your personal data from an AI system under certain conditions, such as when
      the data is no longer necessary for its original purpose, when you withdraw consent, or when there is no
      legitimate interest in continuing to process it. This includes the right to have the system "unlearn" information
      derived from your data where technically feasible.
  - locale: es
    value: >-
