    value: >-
      Technology that converts written text into spoken voice output. These systems analyze text and generate synthetic
      speech that mimics human voice patterns, intonations, and pronunciations. Text-to-Speech is commonly used in
      accessibility tools, virtual assistants, and automated customer service systems.
