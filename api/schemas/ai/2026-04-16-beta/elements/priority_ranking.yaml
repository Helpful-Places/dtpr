id: priority_ranking
category_id: ai__decision
title:
  - locale: en
    value: Priority ranking
  - locale: es
    value: Clasificación prioritaria
  - locale: fr
    value: Classement des priorités
  - locale: km
    value: ចំណាត់ថ្នាក់អាទិភាព
  - locale: pt
    value: Classificação de prioridades
  - locale: tl
    value: Priyoridad na ranggo
description:
  - locale: en
    value: >-
      A decision-making process where the AI/algorithm evaluates multiple items or requests and arranges them in order
      of importance or urgency based on specific criteria. The system assigns relative values to each item and sorts
      them accordingly. Examples include emergency response triage, customer service ticket ordering, maintenance
      request scheduling, or public project funding priorities.
  - locale: es
    value: >-
      Proceso de toma de decisiones en el que la IA/algoritmo evalúa múltiples elementos o solicitudes y los ordena por
      importancia o urgencia en función de criterios específicos. El sistema asigna valores relativos a cada elemento y
      los ordena en consecuencia. Algunos ejemplos son el triaje de respuestas de emergencia, el pedido de tickets de
      atención al cliente, la programación de solicitudes de mantenimiento o las prioridades de financiación de
      proyectos públicos.
  - locale: fr
    value: >-
      Processus décisionnel dans lequel l'IA/l'algorithme évalue plusieurs éléments ou demandes et les classe par ordre
      d'importance ou d'urgence sur la base de critères spécifiques. Le système attribue des valeurs relatives à chaque
      élément et les trie en conséquence. Les exemples incluent le triage des interventions d'urgence, la commande de
      tickets de service à la clientèle, la programmation des demandes de maintenance ou les priorités de financement
      des projets publics.
  - locale: km
    value: >-
      ដំណើរការធ្វើការសម្រេចចិត្តដែល AI/algorithm វាយតម្លៃធាតុ ឬសំណើជាច្រើន ហើយរៀបចំពួកវាតាមលំដាប់លំដោយនៃសារៈសំខាន់
      ឬភាពបន្ទាន់ដោយផ្អែកលើលក្ខណៈវិនិច្ឆ័យជាក់លាក់។ ប្រព័ន្ធកំណត់តម្លៃដែលទាក់ទងទៅធាតុនីមួយៗ ហើយតម្រៀបវាទៅតាមនោះ។
      ឧទាហរណ៏រួមមាន triage ការឆ្លើយតបសង្គ្រោះបន្ទាន់ ការបញ្ជាទិញសំបុត្រសេវាអតិថិជន ការកំណត់កាលវិភាគស្នើសុំការថែទាំ
      ឬអាទិភាពនៃគម្រោងសាធារណៈ។
  - locale: pt
    value: >-
      Um processo de tomada de decisão em que a IA/algoritmo avalia vários itens ou solicitações e os organiza em ordem
      de importância ou urgência com base em critérios específicos. O sistema atribui valores relativos a cada item e os
      classifica de acordo. Os exemplos incluem triagem de resposta de emergência, pedido de tíquetes de atendimento ao
      cliente, programação de solicitações de manutenção ou prioridades de financiamento de projetos públicos.
  - locale: tl
    value: >-
      Isang proseso ng paggawa ng desisyon kung saan sinusuri ng AI/algorithm ang maraming item o kahilingan at inaayos
      ang mga ito sa pagkakasunud-sunod ng kahalagahan o pagkaapurahan batay sa partikular na pamantayan. Ang system ay
      nagtatalaga ng mga kamag-anak na halaga sa bawat item at pinagbubukod-bukod ang mga ito nang naaayon. Kasama sa
      mga halimbawa ang pagsubok sa pagtugon sa emerhensiya, pag-order ng tiket sa serbisyo sa customer, pag-iskedyul ng
      kahilingan sa pagpapanatili, o mga priyoridad sa pagpopondo ng pampublikong proyekto.
