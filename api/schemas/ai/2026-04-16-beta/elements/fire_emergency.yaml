  - locale: km
    value: >-
      គាំទ្រសេវាកម្មដែលធានាសុវត្ថិភាពសាធារណៈ និងសុខភាពទាក់ទងនឹង [គ្រាអាសន្ន](https://en.wikipedia.org/wiki/Emergency)។
      ស្វែងយល់បន្ថែមអំពី [សេវាសង្គ្រោះបន្ទាន់](https://en.wikipedia.org/wiki/Emergency_service)។
  - locale: pt
    value: Apoia os serviços que garantem a segurança e a saúde públicas relacionadas com emergências.
  - locale: tl
    value: >-
      Sinusuportahan ang mga serbisyo na nagtitiyak sa kaligtasan ng publiko at kalusugan na may kaugnayan sa
      emerhensiya. Alamin ang higit pa tungkol sa [mga serbisyong
      pang-emerhensiya](https://en.wikipedia.org/wiki/Emergency_service).
