description:
  - locale: en
    value: >-
      A technology that modifies data to remove or obscure personally identifiable information while preserving the
      underlying patterns needed for analysis. These systems apply techniques such as masking, tokenization, or
      aggregation to protect individual privacy. In public spaces, de-identification processing enables valuable
      insights from data collection without compromising personal information. The technology typically creates a
      barrier between raw collected data and the information used for decision-making.
  - locale: es
    value: >-
      TecnologГӯa que modifica los datos para eliminar u ocultar la informaciГіn personal identificable, conservando al
      mismo tiempo los patrones subyacentes necesarios para el anГЎlisis. Estos sistemas aplican tГ©cnicas como el
      enmascaramiento, la tokenizaciГіn o la agregaciГіn para proteger la privacidad individual. En los espacios pГәblicos,
      el tratamiento de la desidentificaciГіn permite obtener informaciГіn valiosa de la recogida de datos sin comprometer
      la informaciГіn personal. La tecnologГӯa suele crear una barrera entre los datos en bruto recogidos y la informaciГіn
      utilizada para la toma de decisiones.
  - locale: fr
    value: >-
      Technologie qui modifie les donnГ©es afin de supprimer ou d'obscurcir les informations personnellement
      identifiables tout en prГ©servant les modГЁles sous-jacents nГ©cessaires Г  l'analyse. Ces systГЁmes appliquent des
      techniques telles que le masquage, la symbolisation ou l'agrГ©gation pour protГ©ger la vie privГ©e des individus.
      Dans les espaces publics, le traitement de dГ©personnalisation permet d'obtenir des informations prГ©cieuses Г 
      partir de la collecte de donnГ©es sans compromettre les informations personnelles. La technologie crГ©e gГ©nГ©ralement
      une barriГЁre entre les donnГ©es brutes collectГ©es et les informations utilisГ©es pour la prise de dГ©cision.
