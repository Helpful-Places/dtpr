description:
  - locale: en
    value: Not available to me or other individuals. As an individual, there isn't a way for you to access this data.
  - locale: es
    value: No está disponible para mí u otras personas. Como individuo, no hay una manera de acceder a estos datos.
  - locale: fr
    value: >-
      Non disponible pour moi ou d'autres individus. En tant qu'individu, il n'y a aucun moyen pour vous d'accéder à ces
      données.
  - locale: km
    value: មិនមានសម្រាប់ខ្ញុំឬបុគ្គលផ្សេងទៀតទេ។ ក្នុងនាមជាបុគ្គលម្នាក់មិនមានវិធីសម្រាប់អ្នកដើម្បីទទួលបានទិន្នន័យនេះទេ។
  - locale: pt
    value: >-
      Não disponível para mim ou para outros indivíduos. Enquanto indivíduo, não existe uma forma de aceder a estes
      dados.
  - locale: tl
    value: >-
      Hindi magagamit sa akin o sa iba pang mga indibidwal. Bilang indibidwal, walang paraan para ma-access mo ang datos
      na ito.
