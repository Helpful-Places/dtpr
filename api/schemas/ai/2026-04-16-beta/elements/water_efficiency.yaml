id: water_efficiency
category_ids:
  - ai__purpose
title:
  - locale: en
    value: Water Efficiency
  - locale: es
    value: Eficiencia de agua
  - locale: fr
    value: Efficacité de l'eau
  - locale: km
    value: ប្រសិទ្ធភាពទឹក
  - locale: pt
    value: Eficiência hídrica
  - locale: tl
    value: Kahusayan ng tubig
description:
  - locale: en
    value: Reduces water use and/or helps conserve water.
  - locale: es
    value: Reduce el uso del agua y/o ayuda a conservar el agua.
  - locale: fr
    value: >-
      Réduit la consommation d'eau et/ou contribue à sa conservation. Pour en savoir plus sur l'efficacité et la
      conservation de l'eau, ainsi que sur l'infrastructure verte.
  - locale: km
    value: >-
      កាត់បន្ថយការប្រើប្រាស់ទឹកនិង / ឬជួយអភិរក្សទឹក។
      ស្វែងយល់បន្ថែមអំពីប្រសិទ្ធភាពនិងការអភិរក្សទឹកនិងហេដ្ឋារចនាសម្ព័ន្ធបៃតង។
  - locale: pt
    value: >-
      Reduz o consumo de água e/ou ajuda a conservar a água. Saiba mais sobre eficiência e conservação da água e
      infra-estruturas verdes.
  - locale: tl
    value: >-
      Binabawasan ang paggamit ng tubig at/o tumutulong sa pag-iingat ng tubig. Alamin ang higit pa tungkol sa kahusayan
      ng tubig at pag-iingat, at berdeng imprastraktura.
