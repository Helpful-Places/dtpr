description:
  - locale: en
    value: >-
      The right to ensure your data is only used for the specific purposes that were clearly stated when it was
      collected. This prevents organizations from using your data for new, unrelated purposes without your knowledge or
      consent. The data collector must specify and document the intended purposes before collection begins, and adhere
      to these limitations.
  - locale: es
    value: >-
      El derecho a garantizar que sus datos sГіlo se utilicen para los fines especГӯficos que se indicaron claramente
      cuando se recopilaron. Esto impide que las organizaciones utilicen sus datos para nuevos fines no relacionados sin
      su conocimiento o consentimiento. El recopilador de datos debe especificar y documentar los fines previstos antes
      de iniciar la recopilaciГіn, y atenerse a estas limitaciones.
  - locale: fr
    value: >-
      Le droit de s'assurer que vos donnГ©es ne sont utilisГ©es qu'aux fins spГ©cifiques qui ont Г©tГ© clairement Г©noncГ©es
      lors de leur collecte. Cela empГӘche les organisations d'utiliser vos donnГ©es Г  des fins nouvelles et sans rapport
      avec celles-ci, sans que vous en soyez informГ© ou que vous y consentiez. Le collecteur de donnГ©es doit prГ©ciser et
      documenter les finalitГ©s prГ©vues avant le dГ©but de la collecte et respecter ces limitations.
  - locale: km
    value: >-
      бһҹбһ·бһ‘бҹ’бһ’бһ·бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ’бһ¶бһ“бһ¶бһҗбһ¶бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһңбһ¶бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ’бһҡбһҳбһјбһӣбҹ”
      бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ“бҹҒбҹҮбһҡбһ¶бһҡбһ¶бҹҶбһ„бһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“бһ“бһ¶бһ“бһ¶бһ–бһёбһҖбһ¶бһҡбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҗбҹ’бһҳбһё бһҠбҹӮбһӣбһҳбһ·бһ“бһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’бһҠбҹ„бһҷбһҳбһ·бһ“бһҳбһ¶бһ“бһ…бҹҶбһҺбҹҒбҹҮбһҠбһ№бһ„
      бһ¬бһҖбһ¶бһҡбһҷбһӣбҹӢбһ–бҹ’бһҡбһҳбһ–бһёбһўбҹ’бһ“бһҖбҹ” бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҳбһјбһӣбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ бһ“бһ·бһ„бһ…бһ„бһҖбҹ’бһҡбһ„бһҜбһҖбһҹбһ¶бһҡбһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҠбҹӮбһӣбһ”бһ¶бһ“бһӮбҹ’бһҡбҹ„бһ„бһ‘бһ»бһҖ бһҳбһ»бһ“бһ–бҹҒбһӣбһҖбһ¶бһҡбһ”бҹ’бһҡбһҳбһјбһӣбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳ
      бһ бһҫбһҷбһ”бҹ’бһҡбһҖбһ¶бһ“бҹӢбһҒбҹ’бһҮбһ¶бһ”бҹӢбһ“бһјбһңбһҠбҹӮбһ“бһҖбҹҶбһҺбһҸбҹӢбһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбҹ”
  - locale: pt
    value: >-
      O direito de garantir que seus dados sejam usados somente para os fins especГӯficos que foram claramente declarados
      quando foram coletados. Isso impede que as organizaГ§Гөes usem seus dados para finalidades novas e nГЈo relacionadas
      sem seu conhecimento ou consentimento. O coletor de dados deve especificar e documentar as finalidades pretendidas
      antes do inГӯcio da coleta e aderir a essas limitaГ§Гөes.
  - locale: tl
    value: >-
      Ang karapatang matiyak na ang iyong data ay ginagamit lamang para sa mga partikular na layunin na malinaw na
      nakasaad noong ito ay nakolekta. Pinipigilan nito ang mga organisasyon na gamitin ang iyong data para sa bago,
      hindi nauugnay na mga layunin nang hindi mo alam o pahintulot. Dapat tukuyin at idokumento ng tagakolekta ng data
      ang mga nilalayon na layunin bago magsimula ang pangongolekta, at sumunod sa mga limitasyong ito.
