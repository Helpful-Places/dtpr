    value: >-
      A mathematical process that finds the best solution from all possible solutions for a given problem, such as
      determining the most efficient route, schedule, or resource allocation. These algorithms work by systematically
      evaluating different possibilities to maximize or minimize specific outcomes like cost, time, or resources.
  - locale: es
