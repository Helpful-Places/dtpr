      бһҖбһ„бҹ’бһңбҹҮбһҸбһҳбҹ’бһӣбһ¶бһ—бһ¶бһ–бһ“бҹҒбҹҮбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһңбһ¶бһ–бһ·бһ”бһ¶бһҖбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһҖбҹҶбһ бһ»бһҹ бһӣбҹҶбһўбҹҖбһ„ бһ¬бһ”бһүбҹ’бһ бһ¶бһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбҹ”
      бһҖбһ¶бһҡбһ”бһ“бҹ’бһ’бһјбһҡбһ”бһ“бҹ’бһҗбһҷбһўбһ¶бһ…бһҡбһҪбһҳбһҳбһ¶бһ“бһҖбһ¶бһҡбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһӮбҹҶбһҡбһј AI бһҠбҹӮбһӣбһўбһ¶бһ…бһ”бһҖбһҹбҹ’бһҡбһ¶бһҷбһ”бһ¶бһ“бһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ‘бҹ…бһ”бһ¶бһ“ бһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһңбһ·бһ’бһёбһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢ
      бһ“бһ·бһ„бһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһҜбһҖбһҹбһ¶бһҡбһ“бҹғбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҡбһ…бһ“бһ¶бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’ бһ“бһ·бһ„бһҖбһ¶бһҡбһ”бһҺбҹ’бһҸбһ»бҹҮбһ”бһҺбҹ’бһҸбһ¶бһӣбҹ”
  - locale: pt
    value: >-
      O risco de os sistemas de IA tomarem decisГөes por meio de processos difГӯceis ou impossГӯveis de serem compreendidos
      ou explicados por humanos. Essa falta de transparГӘncia dificulta a identificaГ§ГЈo de erros, vieses ou outros
      problemas. As mitigaГ§Гөes podem incluir o uso de modelos de IA interpretГЎveis quando possГӯvel, o desenvolvimento de
      mГ©todos de explicaГ§ГЈo e a manutenГ§ГЈo da documentaГ§ГЈo do projeto do sistema e dos processos de treinamento.
  - locale: tl
    value: >-
      Ang panganib na ang mga AI system ay gumawa ng mga desisyon sa pamamagitan ng mga proseso na mahirap o imposible
      para sa mga tao na maunawaan o maipaliwanag. Dahil sa kawalan ng transparency na ito, nagiging mahirap na tukuyin
      ang mga error, bias, o iba pang isyu. Maaaring kabilang sa mga pagpapagaan ang paggamit ng mga
      nabibigyang-kahulugan na mga modelo ng AI kung posible, pagbuo ng mga paraan ng pagpapaliwanag, at pagpapanatili
      ng dokumentasyon ng disenyo ng system at mga proseso ng pagsasanay.
