description:
  - locale: en
    value: >-
      The risk that AI systems make decisions through processes that are difficult or impossible for humans to
      understand or explain. This lack of transparency makes it challenging to identify errors, biases, or other issues.
      Mitigations may include using interpretable AI models when possible, developing explanation methods, and
      maintaining documentation of system design and training processes.
  - locale: es
    value: >-
      El riesgo de que los sistemas de IA tomen decisiones a travГ©s de procesos que son difГӯciles o imposibles de
      entender o explicar para los humanos. Esta falta de transparencia dificulta la identificaciГіn de errores, sesgos u
      otros problemas. Las medidas de mitigaciГіn pueden incluir el uso de modelos de IA interpretables cuando sea
      posible, el desarrollo de mГ©todos de explicaciГіn y el mantenimiento de documentaciГіn sobre el diseГұo del sistema y
      los procesos de formaciГіn.
  - locale: fr
    value: >-
      Le risque que les systГЁmes d'IA prennent des dГ©cisions par le biais de processus qu'il est difficile, voire
      impossible, pour les humains de comprendre ou d'expliquer. Ce manque de transparence rend difficile
      l'identification des erreurs, des biais ou d'autres problГЁmes. Les mesures d'attГ©nuation peuvent comprendre
      l'utilisation de modГЁles d'IA interprГ©tables lorsque cela est possible, l'Г©laboration de mГ©thodes d'explication et
      la tenue d'une documentation sur la conception du systГЁme et les processus de formation.
  - locale: km
