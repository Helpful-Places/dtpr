description:
  - locale: en
    value: >-
      The right to have a person вҖ” not an automated system вҖ” make or meaningfully reconsider a decision affecting you.
      This is a path to a non-automated decision, separate from the right to challenge a decision that has already
      been made. The reviewing person must have the authority and information to actually change the outcome.
  - locale: es
    value: >-
      El derecho a que una persona вҖ” no un sistema automatizado вҖ” tome o reconsidere de manera significativa una
      decisiГіn que le afecte. Es una vГӯa hacia una decisiГіn no automatizada, distinta del derecho a impugnar una
      decisiГіn ya adoptada. La persona que realiza la revisiГіn debe tener la autoridad y la informaciГіn necesarias
      para modificar realmente el resultado.
  - locale: fr
    value: >-
      Le droit qu'une personne вҖ” et non un systГЁme automatisГ© вҖ” prenne ou rГ©examine de maniГЁre significative une
      dГ©cision vous concernant. Il s'agit d'une voie vers une dГ©cision non automatisГ©e, distincte du droit de contester
      une dГ©cision dГ©jГ  prise. La personne qui procГЁde Г  l'examen doit disposer de l'autoritГ© et des informations
      nГ©cessaires pour modifier effectivement le rГ©sultat.
  - locale: km
    value: >-
      бһҹбһ·бһ‘бҹ’бһ’бһ·бһұбҹ’бһҷбһҳбһ“бһ»бһҹбҹ’бһҹ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· вҖ” бһ’бҹ’бһңбһҫбһ¬бһ–бһ·бһ…бһ¶бһҡбһҺбһ¶бһЎбһҫбһ„бһңбһ·бһүбһҠбҹ„бһҷбһҳбһ¶бһ“бһ“бҹҗбһҷбһ…бҹҶбһ–бҹ„бҹҮбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһ”бҹүбҹҮбһ–бһ¶бһӣбҹӢбһҠбһӣбҹӢбһўбҹ’бһ“бһҖбҹ”
      бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһ•бҹ’бһӣбһјбһңбһ‘бҹ…бһҖбһ¶бһ“бҹӢбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· бһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖбһ–бһёбһҹбһ·бһ‘бҹ’бһ’бһ·бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ”бҹ’бһҡбһҶбһ¶бҹҶбһ„бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ’бҹ’бһңбһҫбһҡбһҪбһ…бһ бһҫбһҷбҹ”
      бһҳбһ“бһ»бһҹбҹ’бһҹбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҳбһ¶бһ“бһҹбһ·бһ‘бҹ’бһ’бһ·бһўбҹҶбһҺбһ¶бһ… бһ“бһ·бһ„бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҠбһҫбһҳбҹ’бһ”бһёбһ–бһ·бһҸбһҮбһ¶бһўбһ¶бһ…бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһӣбһ‘бҹ’бһ’бһ•бһӣбҹ”
  - locale: pt
    value: >-
      O direito a que uma pessoa вҖ” e nГЈo um sistema automatizado вҖ” tome ou reconsidere de forma significativa uma
      decisГЈo que o afete. Trata-se de um caminho para uma decisГЈo nГЈo automatizada, distinto do direito de contestar
      uma decisГЈo jГЎ tomada. A pessoa que faz a revisГЈo deve ter a autoridade e as informaГ§Гөes necessГЎrias para
      realmente alterar o resultado.
  - locale: tl
    value: >-
      Ang karapatang isang tao вҖ” hindi isang awtomatikong sistema вҖ” ang gumawa o makabuluhang muling magsuri ng isang
      desisyong nakakaapekto sa iyo. Ito ay isang daan tungo sa isang hindi awtomatikong desisyon, hiwalay sa
      karapatang hamunin ang isang desisyong nagawa na. Ang taong nagsusuri ay dapat may kapangyarihan at impormasyon
      upang aktwal na mabago ang resulta.
