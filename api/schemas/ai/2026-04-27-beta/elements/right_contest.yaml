description:
  - locale: en
    value: >-
      The right to challenge decisions made by an AI system that affect you, particularly when these decisions have
      legal or similarly significant effects. This includes the right to request human review of automated decisions,
      provide additional information, express your point of view, and have the decision reconsidered based on your
      input.
  - locale: es
    value: >-
      El derecho a impugnar las decisiones tomadas por un sistema de IA que le afecten, en particular cuando estas
      decisiones tengan efectos jurГӯdicos o de importancia similar. Esto incluye el derecho a solicitar una revisiГіn
      humana de las decisiones automatizadas, a proporcionar informaciГіn adicional, a expresar su punto de vista y a que
      se reconsidere la decisiГіn sobre la base de sus aportaciones.
  - locale: fr
    value: >-
      Le droit de contester les dГ©cisions prises par un systГЁme d'IA qui vous concernent, en particulier lorsque ces
      dГ©cisions ont des effets juridiques ou des effets similaires importants. Cela inclut le droit de demander un
      examen humain des dГ©cisions automatisГ©es, de fournir des informations supplГ©mentaires, d'exprimer votre point de
      vue et d'obtenir que la dГ©cision soit rГ©examinГ©e sur la base de votre contribution.
  - locale: km
    value: >-
