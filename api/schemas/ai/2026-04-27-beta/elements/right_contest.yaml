  - locale: pt
    value: >-
      O direito de contestar as decisГөes tomadas por um sistema de IA que o afetam, especialmente quando essas decisГөes
      tГӘm efeitos legais ou igualmente significativos. Isso inclui o direito de solicitar a revisГЈo humana de decisГөes
      automatizadas, fornecer informaГ§Гөes adicionais, expressar seu ponto de vista e fazer com que a decisГЈo seja
      reconsiderada com base em sua opiniГЈo.
  - locale: tl
    value: >-
      Ang karapatang hamunin ang mga desisyong ginawa ng isang AI system na nakakaapekto sa iyo, lalo na kapag ang mga
      desisyong ito ay may legal o katulad na makabuluhang epekto. Kabilang dito ang karapatang humiling ng pagsusuri ng
      tao sa mga awtomatikong desisyon, magbigay ng karagdagang impormasyon, ipahayag ang iyong pananaw, at muling
      isaalang-alang ang desisyon batay sa iyong input.
