id: system_drift
category_id: risks_mitigation
title:
  - locale: en
    value: System Drift and Temporal Validity
  - locale: es
    value: Deriva del sistema y validez temporal
  - locale: fr
    value: Dérive du système et validité temporelle
  - locale: km
    value: ប្រព័ន្ធរសាត់ និងសុពលភាពបណ្តោះអាសន្ន
  - locale: pt
    value: Desvio do sistema e validade temporal
  - locale: tl
    value: System Drift at Temporal Validity
description:
  - locale: en
    value: >-
      The risk that an AI system's performance degrades over time as real-world conditions change from those present in
      training data. This occurs when the relationships between variables in the real world evolve, but the model
      remains static, leading to increasingly inaccurate outputs. Examples include urban planning models that don't
      account for demographic shifts or transportation patterns that change seasonally or with new infrastructure.
  - locale: es
    value: >-
      El riesgo de que el rendimiento de un sistema de IA se degrade con el tiempo a medida que las condiciones del
      mundo real cambian con respecto a las presentes en los datos de entrenamiento. Esto ocurre cuando las relaciones
      entre las variables del mundo real evolucionan, pero el modelo permanece estático, lo que conduce a resultados
      cada vez más imprecisos. Algunos ejemplos son los modelos de planificación urbana que no tienen en cuenta los
      cambios demográficos o los patrones de transporte que cambian estacionalmente o con las nuevas infraestructuras.
  - locale: fr
    value: >-
      Le risque que les performances d'un système d'IA se dégradent au fil du temps lorsque les conditions du monde réel
      changent par rapport à celles présentes dans les données d'apprentissage. Cela se produit lorsque les relations
      entre les variables du monde réel évoluent, mais que le modèle reste statique, ce qui conduit à des résultats de
      plus en plus imprécis. Parmi les exemples, citons les modèles de planification urbaine qui ne tiennent pas compte
      des changements démographiques ou des schémas de transport qui changent au fil des saisons ou avec l'arrivée de
      nouvelles infrastructures.
  - locale: km
    value: >-
      ហានិភ័យដែលដំណើរការរបស់ប្រព័ន្ធ AI ធ្លាក់ចុះតាមពេលវេលា
      ដោយសារលក្ខខណ្ឌក្នុងពិភពពិតផ្លាស់ប្តូរពីទិន្នន័យដែលមានវត្តមានក្នុងវគ្គបណ្តុះបណ្តាល។
      វាកើតឡើងនៅពេលដែលទំនាក់ទំនងរវាងអថេរនៅក្នុងពិភពពិតវិវឌ្ឍ ប៉ុន្តែគំរូនៅតែឋិតិវន្ត
      ដែលនាំទៅរកលទ្ធផលមិនត្រឹមត្រូវកាន់តែខ្លាំង។ ឧទាហរណ៍រួមមានគំរូផែនការទីក្រុងដែលមិនគិតពីការផ្លាស់ប្តូរប្រជាសាស្រ្ត
      ឬគំរូនៃការដឹកជញ្ជូនដែលផ្លាស់ប្តូរតាមរដូវកាល ឬជាមួយហេដ្ឋារចនាសម្ព័ន្ធថ្មី។
  - locale: pt
    value: >-
      O risco de que o desempenho de um sistema de IA se degrade com o tempo à medida que as condições do mundo real
      mudam em relação àquelas presentes nos dados de treinamento. Isso ocorre quando as relações entre as variáveis no
      mundo real evoluem, mas o modelo permanece estático, levando a resultados cada vez mais imprecisos. Os exemplos
      incluem modelos de planejamento urbano que não levam em conta as mudanças demográficas ou os padrões de transporte
      que mudam sazonalmente ou com a nova infraestrutura.
  - locale: tl
    value: >-
      Ang panganib na bumababa ang performance ng isang AI system sa paglipas ng panahon habang nagbabago ang mga
      kondisyon sa totoong mundo mula sa mga naroroon sa data ng pagsasanay. Ito ay nangyayari kapag ang mga ugnayan sa
      pagitan ng mga variable sa totoong mundo ay nagbabago, ngunit ang modelo ay nananatiling static, na humahantong sa
      lalong hindi tumpak na mga output. Kasama sa mga halimbawa ang mga modelo sa pagpaplano ng lunsod na hindi
      isinasaalang-alang ang mga pagbabago sa demograpiko o mga pattern ng transportasyon na nagbabago sa pana-panahon o
      sa bagong imprastraktura.
