description:
  - locale: en
    value: >-
      Supports a mechanical function - such as turning a device on or off, opening or closing, or adjusting brightness
      and intensity.
  - locale: es
    value: >-
      Admite una función mecánica, como encender o desactivar un dispositivo, abrir o cerrar, o ajustar el brillo y la
      intensidad.
  - locale: fr
    value: >-
      Prend en charge une fonction mécanique - comme la mise en marche ou l'arrêt d'un appareil, son ouverture ou sa
      fermeture, ou le réglage de la luminosité et de l'intensité.
  - locale: km
    value: គាំទ្រមុខងារមេកានិច - ដូចជាការបិទឬបិទឧបករណ៍បើកឬបិទឬកែតម្រូវពន្លឺនិងអាំងតង់ស៊ីតេ។
  - locale: pt
    value: >-
      Suporta uma função mecânica - como ligar ou desligar um dispositivo, abrir ou fechar, ou ajustar o brilho e a
      intensidade.
  - locale: tl
    value: >-
      Sinusuportahan ang isang mekanikal na paggana - tulad ng pagpaandar o pagpatay ng isang aparato, pagbubukas o
      pagsasara, o pag-aayos ng ningning at lakas.
