name: API deploy
on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-deploy.yaml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional: deploy only this version (e.g. ai@2026-04-27-beta). Leave empty to deploy every version under api/schemas/.'
        required: false
        default: ''

concurrency:
  group: api-deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy worker + atomic R2 upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # @dtpr/api/schema + @dtpr/api/validator ship via tsup-compiled dist/;
      # @dtpr/ui's three subpaths ship via Vite library mode. Both must be
      # built before `tsc --noEmit` can resolve the subpath imports.
      - run: pnpm --filter ./api build:schema
      - run: pnpm --filter @dtpr/ui build

      # Re-run the test suite on the exact deploy artifact to catch any
      # path-filter slippage (e.g. a non-api/ change that affects api/).
      - run: pnpm --filter ./api typecheck
      - run: pnpm --filter ./api test

      # Source of truth = git tree under api/schemas/. Every <type>/<dir>
      # is published; r2-upload.ts is idempotent (skips unchanged manifests
      # by content_hash) so unchanged stables are a fast no-op. The
      # workflow_dispatch `version` input narrows to a single version when
      # set — useful for replaying a single failed upload.
      - name: Resolve schema versions to deploy
        id: schemas
        working-directory: api/schemas
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          override="$INPUT_VERSION"
          if [ -n "$override" ]; then
            versions="$override"
            echo "Single-version override: $versions"
          else
            versions=$(find . -mindepth 2 -maxdepth 2 -type d \
              | sed 's|^\./||' \
              | sed 's|/|@|' \
              | sort)
            if [ -z "$versions" ]; then
              echo "::error::No schema versions found under api/schemas/"
              exit 1
            fi
            echo "Versions to deploy:"
            echo "$versions"
          fi
          {
            echo 'list<<EOF'
            echo "$versions"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      # Validate + build every bundle BEFORE the worker deploy. If any
      # version fails validation we want to bail out before flipping the
      # worker, not halfway through the upload phase.
      - name: Build all schema bundles
        run: |
          set -euo pipefail
          while IFS= read -r v; do
            [ -z "$v" ] && continue
            echo "::group::schema:build $v"
            pnpm --filter ./api schema:build "$v"
            echo "::endgroup::"
          done <<< "${{ steps.schemas.outputs.list }}"

      - name: Deploy worker (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN_PROD }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api
          command: deploy --env=""

      # Per-version atomic upload. The script's idempotency contract:
      #   - matching content_hash → no-op (unchanged stables, unchanged betas)
      #   - stable mismatch → hard fail (immutability breach)
      #   - beta mismatch → overwrite + index flip
      - name: Atomic R2 upload (production)
        working-directory: api
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID_PROD }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY_PROD }}
          R2_BUCKET: dtpr-api
        run: |
          set -euo pipefail
          while IFS= read -r v; do
            [ -z "$v" ] && continue
            echo "::group::r2-upload $v"
            pnpm tsx scripts/r2-upload.ts "$v"
            echo "::endgroup::"
          done <<< "${{ steps.schemas.outputs.list }}"

      # Prune index entries whose source dir was deleted (e.g. after
      # schema:promote renamed `<date>-beta` to `<date>`). Skipped when
      # the workflow_dispatch single-version override is set, since we
      # haven't enumerated the full source tree in that case.
      - name: Prune stale index entries (production)
        if: ${{ inputs.version == '' }}
        working-directory: api
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID_PROD }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY_PROD }}
          R2_BUCKET: dtpr-api
        run: pnpm tsx scripts/r2-prune.ts

      - name: Post-deploy smoke tests
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          echo "::group::healthz"
          curl -fsS https://api.dtpr.io/healthz | tee /tmp/healthz
          grep -q '"ok":true' /tmp/healthz
          echo "::endgroup::"

          # Cache API check (R2 endpoint becomes meaningful once Unit 9
          # ships /api/v2/schemas; until then we just verify the worker
          # handles the request without 5xx).
          echo "::group::cache check"
          first=$(curl -sS -o /dev/null -w '%{http_code}' https://api.dtpr.io/api/v2/schemas || true)
          second_status=$(curl -sS -D - -o /dev/null https://api.dtpr.io/api/v2/schemas | tr -d '\r' || true)
          echo "first=$first"
          echo "$second_status" | head -10
          echo "::endgroup::"

          # Direct R2 public URL must NOT serve the bundle. The bucket
          # should never be publicly accessible — Worker is the gatekeeper.
          echo "::group::r2 public access"
          public_status=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://pub-${ACCOUNT_ID}.r2.dev/schemas/index.json" || true)
          echo "public_status=$public_status"
          if [ "$public_status" = "200" ]; then
            echo "::error::R2 bucket is publicly readable — bypasses Worker middleware. Disable r2.dev public access."
            exit 1
          fi
          echo "::endgroup::"
