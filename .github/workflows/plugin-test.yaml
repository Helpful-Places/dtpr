name: Plugin conformance
on:
  push:
    branches: [main]
    paths:
      - 'plugin/**'
      - '.claude-plugin/**'
      - 'api/src/mcp/tools.ts'
      - '.github/workflows/plugin-test.yaml'
  pull_request:
    paths:
      - 'plugin/**'
      - '.claude-plugin/**'
      - 'api/src/mcp/tools.ts'
      - '.github/workflows/plugin-test.yaml'

jobs:
  verify:
    name: Offline plugin conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so verify.mjs can compute `git merge-base origin/main HEAD`
          # for the INDEX.md append-only check.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run test:plugin
